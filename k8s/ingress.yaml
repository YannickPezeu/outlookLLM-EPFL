apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: outlook-plugin-ingress
  namespace: epfl-chatbot
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  ingressClassName: nginx
  rules:
    - host: expert-finder.epfl.ch
      http:
        paths:
          - path: /outlook
            pathType: Prefix
            backend:
              service:
                name: outlook-plugin-svc
                port:
                  number: 80
