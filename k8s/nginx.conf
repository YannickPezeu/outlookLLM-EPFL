server {
    listen 80;
    server_name _;

    # Serve static files (the Outlook add-in) under /outlook/
    location /outlook/ {
        alias /usr/share/nginx/html/;
        index taskpane.html;
        try_files $uri $uri/ =404;
    }

    # Redirect /outlook to /outlook/
    location = /outlook {
        return 301 /outlook/;
    }

    # CORS proxy for RCP API
    location /outlook/api/rcp/ {
        # Remove /api/rcp/ prefix and forward to RCP
        rewrite ^/outlook/api/rcp/(.*) /v1/$1 break;
        proxy_pass https://inference.rcp.epfl.ch;
        proxy_ssl_server_name on;

        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
        add_header 'Access-Control-Max-Age' '86400' always;

        # Handle preflight OPTIONS
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type';
            add_header 'Access-Control-Max-Age' '86400';
            add_header 'Content-Length' '0';
            add_header 'Content-Type' 'text/plain';
            return 204;
        }

        # Pass through request headers
        proxy_set_header Host inference.rcp.epfl.ch;
        proxy_set_header X-Real-IP $remote_addr;

        # Streaming support (SSE)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }
}
